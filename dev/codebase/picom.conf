# Minimal Picom Config for Hana WM
# Save as ~/.config/picom/picom.conf
#
# This config is OPTIONAL - default picom should work fine for transparency!
# This config just adds blur for a nicer effect.

# Backend
backend = "glx";

# VSync prevents screen tearing
vsync = true;

# Optional: Blur effect behind transparent windows
blur:
{
  method = "dual_kawase";
  strength = 5;
};

blur-background = true;

# Don't blur the desktop wallpaper
blur-background-exclude = [
  "window_type = 'desktop'",
];

# Fading for smooth transitions
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

