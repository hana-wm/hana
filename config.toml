### akai_hana's personal hana WM config.toml :-) ###

### NOTES:
#
# - All parameters and values are cApS-iNsEnSiTiVe. 
# - Strings can be set with single or double quotes (''/"").
# - Decimal values can use a dot (N.NN) or comma (N,NN).
# - Any percentage value can be decimal (N.NN%/%N.NN).
#
# + Parameters can be set to a numerical value N (px) or N%/%N (ratio)
#   - 'N' represents an exact amount of pixels occupied on the screen.
#   + 'N%' represents either a ratio or the scaling of a default value.
#      - For example, `gap_width = 5%` will make the gaps of windows
#        take up 5% of the total display's viewable area.
#      - As for default value scaling, 'indicator_size = 125%' will make
#         the workspace indicators be +25% of their default 100% (5 px).
#
# #TODO: move to future colors.toml
# - HEX color code values can be set to either of the following formats:
#   "#RRGGBB" / RRGGBB / 0xRRGGBB
#
# + Keys in a keybind can be expanded by using `{}` in the key combination
#   in order to set an array of keybinds, effectively assigning a single
#   action to multiple key combinations in the same line.
#   - `Mod+{Q,W,E,R} = "workspace"` sets workspace switching to 4 binds,
#     Mod+Q through R.
#   - `Mod+{1-9} = "workspace"` sets workspace switching to 9 binds, keys
#     Mod+1 through 9.
#   - Both can be combined at will: `Mod+{1-4,Q,W,E,R} = "workspace"`.
#
# + `{}` in place of the action instead of the keybind serves as an alias
#   ```toml
#   Mod+L = "larry"
#   kill = "pkill -9"
#   Mod+Shift+L = "{kill} larry"
#   ```
#   
# + A single keybind can invoke multiple actions at once.
#   - `Mod+A = "foo"; Mod+A = "bar"` aren't conflicting;
#     both `foo` and `bar` will be executed upon pressing Mod+A.
#   - More conveniently, arrays of actions can be set onto a bind:
#     `Mod+A = ["foo", "bar"]`

[tiling]
enabled       = true
global_layout = false # Per-workspace tiling layouts

# Enabled layouts
## Layouts not defined on the array will not be available in runtime.
## Not defining the array at all enables all layouts in `src/tiling/layouts/.`

#       Layout          Variation  Workspaces
layouts = [                                 # ("default"/"alternative") 
	"master-stack",                     # "lifo"/"fifo"
	"monocle",      "gaps",    "5",     # "gapless"/"gaps"
	"grid",         "relaxed", "6,8",   # "rigid"/"relaxed"
	# "fibonacci",                      # no variations
]

[tiling.aesthetics]
# [0%-200%] / [0-N] px
## 100% = Entire display; 0% = disabled
gap_width        = 3%
border_width     = 1.5% #TODO: 100% doesn't cover 100% of the display.
#TODO: make config parser accept both N% and %N values (currently %N doesn't work).

border_focused   = "#ac3232"
border_unfocused = "#52263e"

[tiling.layouts.master-stack]
count = 1      # Number of windows in master area (master stack size)
side  = "left" # "left"/"right" / 'L'/'R'
width = 50%    # [5%-95%] / (0-N] px

# "lifo" = Last (window remains) In (master area), First (window gets) Out (of master, and onto the stack).
# "fifo" = First (window goes) In (master area), First (window goes) Out (of master, and onto the stack).
variation = "lifo" # "lifo"/"fifo"

# Override the 3-character indicator shown in the bar for this layout.
# Defaults to the variation name ("LIF" or "FIF") when not set.
# indicator = "M-S"

### TODO: review from here on down

[tiling.layouts.monocle]
# Behavioral variation for monocle:
#   "gaps"    = honour window gap settings like every other layout
#   "gapless" = true fullscreen — ignore gap settings (default)
variation = "gaps"

# Override the 3-character indicator shown in the bar for this layout.
# Defaults to the variation name ("GAP" or "GLS") when not set.
# indicator = "MON"

[tiling.layouts.grid]
# Behavioral variation for grid:
#   "rigid"   = strict grid; empty cells left in an incomplete last row (default)
#   "relaxed" = last window in an incomplete row expands to fill the row
variation = "relaxed"

# Override the 3-character indicator shown in the bar for this layout.
# Defaults to the variation name ("RGD" or "RLX") when not set.
# indicator = "GRD"

[tiling.layouts.fibonacci]
# Fibonacci has no behavioral variations.
# Optionally override the 3-character indicator shown in the bar for this layout.
# indicator = "FIB"

[bar]
enabled = true
position = "bottom" # can be switched on runtime

# Font
## First value is the default font used
## Subsequent values render in characters not included by first value (ej. non-ASCII)
fonts = [
    "FiraCode Nerd Font Propo Ret",
    "Noto Sans CJK JP", # japanese characters
]

# Bar height
## Auto-adapts to font size by default.
height = 3.5%

## Font size covers a percentage of the bar's area according to its height
## (e.g., 16% = font takes up 16% of the bar's vertical space)
font_size = 70%
indicator_size = 25%

# Workspace labels/icons (1-N)
icons = ["あ", "か", "い", "は", "な", "つ", "ん", "で"]

segment_spacing = 5%
indicator_padding = 40%

#
## if neither is set
# indicator_focused = "■"
# indicator_unfocused = "□"
indicator_location = "up-left"

# Workspace width as percentage of base (100% = 40px, 150% = 60px, or set exact pixels)
workspace_tag_width = 100%  # Default base width



# Bar transparency (0 = fully transparent, 1 = fully opaque)
# With picom's gaussian blur, the bar will show blurred content behind it
transparency = 0% # [0.0 - 1.0] / [0% - 100%]

# drun command runner prompt string (default: "run: ")
drun_prompt = "❯ "

# Main color palette
## Bar
bg = "#0d0d14"
fg = "#ebd9bc"

## Workspace tag indicators
selected_bg = "#ac3232"
selected_fg = "#eeeeee"
occupied_fg = "#eeeeee"
urgent_bg   = "#FF0000"
urgent_fg   = "#FFFFFF"

# Accent colors for bar segments
# Default accent for all segments
# accent_color = "#ac3232"
accent_color = "#ac3232"

# Per-segment accent colors (overrides default accent_color)
# These are now properly working - each segment can have its own accent color
[bar.colors]
workspaces = "#b9c0a8"  # Custom accent for workspace indicators
title = "#ac3232"       # Custom accent for title segment  
title_unfocused = "#52263e"
title_minimized = "#007373"

clock = "#ac3232"       # Custom accent for clock segment

# drun command runner colors (all optional — omit to use bar-wide defaults)
 # drun_bg           = "#0d0d14"  # background (default: bar bg)
 # drun_fg           = "#ebd9bc"  # typed text  (default: bar fg)
 # drun_prompt_color = "#ac3232"  # prompt text + cursor (default: title accent)

# Configurable bar layout
# You can rearrange segments however you like
# Available segments: "workspaces", "title", "clock", "layout"

# Bar layout
# Anchors: left/center/right
[bar.layout.left]
segments = ["workspaces", "layout", "variations"]

[bar.layout.center]
segments = ["title"]

[bar.layout.right]
segments = ["clock"]

# Bar module configurations
[bar.modules.workspaces]
count = 8  # Number of workspaces

[binds]
# Convenience alias
## Parameter placeholders
Mod = "Super" # Super/Mod4, Alt/Mod1

## Value placeholders ({})
kill = "pkill -9" # program kill value placeholder

# WM interactions
Mod+F = "toggle_fullscreen"
Mod+Shift+Return = "{kill} Xorg" # quit wm
Mod+Shift+F = "close_window"     # Close focused window
Mod+Shift+Y = "reload"           # Config hot-reload

Mod+T           = "minimize_window"
Mod+Shift+T     = "unminimize_lifo"
Mod+Alt+T       = "unminimize_fifo"
Mod+Shift+Alt+T = "unminimize_all"

# wallpaper
Mod+G = "~/eudaimonia/shader-wallpaper/shadow/scripts/shader-switch.sh" # start shader wallpaper
Mod+Shift+G = "~/eudaimonia/shader-wallpaper/shadow/scripts/shader-stop.sh" # stop shader wallpaper

# Tiling
Mod+N           = "toggle_tiling"          # Enable/disable tiling
Mod+space       = "toggle_layout"          # Cycle layouts forward
Mod+Shift+space = "toggle_layout_reverse"  # Cycle layouts backward
Mod+Alt+space   = "cycle_layout_variation" # Cycle current layout's variation (Super+V)
Mod+Tab         = "swap_master"            # Swap focused window with master (slave→master or master→slave)
Mod+Shift+Tab   = "swap_master_focus_swap" # Same swap, but focus transfers to the displaced window
Mod+grave       = "drun_toggle"
Mod+MiddleClick = "toggle_float"           # Toggle clicked window between tiled and floating

# Layouts
## Master-stack
Mod+H      = "decrease_master" 
Mod+L      = "increase_master" # Increase master area width
Mod+comma  = "increase_master_count"
Mod+period = "decrease_master_count" 

# Workspaces
## Switch to workspace N
### Keys are assigned workspace indices by their position in the list.
Mod+{1-4,Q,W,E,R} = "workspace" #TODO: rename to "switch_to_workspace"

## Workspace window sending
Mod+Shift+{1-4,Q,W,E,R} = "move_to_workspace"
Mod+Alt+{1-4,Q,W,E,R} = "tag_toggle" #TODO: rename to toggle_to_workspace

# Bar
Mod+B       = "toggle_bar_visibility"  # shown/hidden
Mod+Shift+B = "toggle_bar_position"    # top/bottom

# Program binds

## Misc
Mod+A       = "MOZ_USE_XINPUT2=1 firefox"
Mod+Shift+A = "{kill} firefox"

Mod+S       = "flatpak run org.equicord.equibop"
Mod+Shift+S = "{kill} equibop"

Mod+D       = "ghostty"
Mod+Shift+D = "{kill} ghostty"

# z -> osu

Mod+X       = "~/Games/t-client/DDNet"
Mod+Shift+X = "{kill} DDNet"

Mod+c       = "flatpak run com.valvesoftware.Steam"
Mod+Shift+C = "{kill} steam"

Mod+V       = "flatpak run com.github.th_ch.youtube_music"
Mod+Shift+V = "{kill} youtube-music"

# Emergency/Debug
# Emergency recovery: Disables tiling, clears fullscreen, maps all windows, stops drag
Mod+Shift+Escape = "emergency_recover" #TODO: remove. this is hacky and assumes the program bugging out is a recurrent issue. therefore it is unneeded.

# Workspace rules

# Available formats:
# 
# - Per-workspace rules
# Example: 
#
# ```toml
# [workspace.rules.N] # N = workspace number
# <program_name>
# ```
#
# - Rule arrays
# Example:
#
# ```toml
# 1 = ["<program_1>", "<program_2>"] # Workspace 1
# 2 = ["<program_3>"]                # Workspace 2
# ```

[workspace.rules.1] # browser
Navigator
Firefox

[workspace.rules.2] # socials
discord
vesktop
equibop
electron

[workspace.rules.3] # music
com.github.th_ch.youtube_music

[workspace.rules.4] # launchers
OpenTabletDriver.UX

[workspace.rules.5] # gaming
"osu!"
DDNet

[workspace.rules.6] # editors
emacs
xeyes

[workspace.rules.7] # media
prismlauncher
freetube
gimp

[workspace.rules.8] # torrenting
deluge
