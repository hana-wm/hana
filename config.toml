# hana configuration

[tiling]
enabled = 1  # 1 = true, 0 = false
layout = "master_left"  # Options: "master_left", "monocle", "grid"
master_width_factor = 50 # %
master_count = 1
gaps = 10
border_width = 2
border_focused = "#5294E2"
border_normal = "#383C4A"

[Keybindings]
# Execute commands
Super+Return = "ghostty"
Mod4+Shift+q = "kill"

# Tiling
Super+t       = "toggle_layout"
Super+h       = "decrease_master"
Super+l       = "increase_master"
Super+i       = "increase_master_count"
Super+d       = "decrease_master_count"
Super+Shift+t = "toggle_tiling"
