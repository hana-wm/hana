### akai_hana's personal hana WM config.toml :-) ###

### NOTES:
# + All parameters (X =) and values (= Y) are CAPS-insensitive. 
#   - _It boils down to preference. Style them however you want :9_
#
# + Numerical values can be either N (px) or N%/%N (ratio)
#   - The former represents an exact amount of pixels,
#     while the latter represents a ratio between two elements.
#     For example, 'gaps = 5%' will make gaps take up 5%
#     of viewable area in relation to the size of windows.
#   - Any percentage value can be N% or %N, decimal or not (N.NN%),
#     and if decimal, use a dot or a comma (N.N%/N,N%).
#
# + HEX code values can be set with either of the following formats:
#   "#RRGGBB" / '#RRGGBB' / RRGGBB / 0xRRGGBB
#   - (Any string can be wrapped with "" or '')
#
# +

[tiling]
enabled = true #TODO: change "enabled" to "enable"
layout = "master" # master_left / monocle / grid / fibonacci

# Aesthetics
#TODO: make [tiling.aesthetics]
gaps             = 2.5%
border_width     = 1% 
border_focused   = '#ac3232'
border_unfocused = '#52263e' # Letters can also be MAJUS/minus

#TODO: make new [tiling.layouts] section, where the user can set the available layouts through an array.
# the first element in the array is the bootup default, while cycling forward will move from the top to
# the bottom of the array.
# ej.

# layouts = [
# 	master-stack,
# 	monocle,
# 	grid,
# ]

# Tiling layouts
## Master-stack
#TODO: convert previous 2 lines to [tiling.layouts.master-stack], then replace master_count with count, master_side with side, and so on, instead of appending "master_" to each parameter.
master_count = 1      # Number of windows in master area (master stack size)
master_side  = "left" # Left/Right L/R
master_width = 50%    # N/N% (5%-95% (suggestion of presentation))

[bar]
show      = true #TODO: change "show" to "enable"
position  = "bottom" # top/bottom; can be swapped on runtime

# Font array; priority order: first font is primary, others come next when first doesn't support some character.
# Useful for non-ASCII character support, while retaining a primary ASCII font.
fonts = [
    "FiraCode Nerd Font Propo Ret",
    "Noto Sans CJK JP",
]

# Legacy single font option (used if fonts array is not set):
#font = "FiraCode Nerd Font Ret" #TODO: remove this legacy feature; user can just set an array with one element.

font_size = 16% #TODO: add a comment on what this line does. in specific, what's the ratio of this percentage-based value (between what and what?)

# Workspace labels/icons
icons = ["あ", "か", "い", "は", "な", "つ", "ん", "で"]
segment_spacing = 8% # Spacing between each segment/module inside the bar
#TODO: what's the difference between setting segment_spacing as N and as N%? i notice no real difference...
# add a comment explaining so. if there truly is no difference, then fix it, as it'd make no sense then.

# Bar height
## Auto-adapts to font size by default. Uncomment to set a fixed height instead:
#height = 32 #TODO: enable a percentage value, where 100% is the auto-calculated size, and 150% would be 1.5x times the size of that, for example.

# Bar spacing
padding = 99 # Padding inside segments (around text)
#TODO: i'm still not sure what padding actually does. can you add a comment here clarifying what it does?

# Bar transparency (0.0 = fully transparent, 1.0 = fully opaque)
# Accepts formats: 0.9 or 90 (will be normalized to 0-1)
# With picom's gaussian blur, the bar will show blurred content behind it
# transparency = 50 # %
transparency = 100% # %

# Main color palette
## Bar
bg          = "#0d0d14"
# fg          = "#bbbbbb"
fg          = "#ebd9bc"

## Workspace tag indicators
selected_bg = "#ac3232"
selected_fg = "#eeeeee"
occupied_fg = "#eeeeee"
urgent_bg   = "#FF0000"
urgent_fg   = "#FFFFFF"

indicator_size = 1

# Accent colors for bar segments
# Default accent for all segments
title_accent = true #TODO: remove this parameter, and all its related logic, as it is useless; the user could just set the title accent hex code to the same hexcode of the background color.
accent_color = "#ac3232"

# Per-segment accent colors (overrides accent_color)
# [bar.colors]
# workspaces = "#ac3232"
# title      = "#ac3232"
# clock      = "#ac3232"

# Configurable bar layout
# You can rearrange segments however you like
# Available segments: "workspaces", "title", "clock", "layout"

# Bar layout
# Anchors: left/center/right
[bar.layout.left]
segments = ["workspaces", "layout"]

[bar.layout.center]
segments = ["title"]

[bar.layout.right]
segments = ["clock"]

[workspaces]
count = 8

[Keybindings]
# Convenience alias
Mod = "Super" # Super/Mod4 / Alt/Mod1

# WM interactions
Mod+F = "toggle_fullscreen"
Mod+Shift+Return = "pkill -9 Xorg" # quit w
#TODO (implemented but not properly working yet)
Mod+Shift+F = "kill"
Mod+Shift+T = "reload" # Config hot-reload


# wallpaper
Mod+G = "~/eudaimonia/shader-wallpaper/shadow/scripts/shader-switch.sh" # start shader wallpaper
Mod+Shift+G = "~/eudaimonia/shader-wallpaper/shadow/scripts/shader-stop.sh" # stop shader wallpaper


# Tiling
Mod+N           = "toggle_tiling" # Enable/disable tiling
Mod+space       = "toggle_layout" # TODO Cycle layouts
Mod+Shift+space = "toggle_layout_reverse"
Mod+Tab         = "swap_master"   # Swap focused window with master (slave→master or master↔slave)

# Layouts
## Master-stack
Mod+H           = "decrease_master" # area TODO
Mod+L           = "increase_master" # area
Mod+comma       = "increase_master_count"
Mod+period      = "decrease_master_count" 

# Workspaces
#TODO make workspace array
Mod+1 = "workspace_1"
Mod+2 = "workspace_2"
Mod+3 = "workspace_3"
Mod+4 = "workspace_4"
Mod+Q = "workspace_5"
Mod+W = "workspace_6"
