# hana WM config

[tiling]
enabled     = true     # Enable tiling on startup
layout      = "master" # Default layout: master_left, monocle, or grid
master_side = "left"

master_count        = 1        # Number of windows in master area
master_width_factor = 55       # Master area width (5-95, percentage)
gaps                = 12       # Gap between windows (pixels)
border_width        = 4        # Border thickness (pixels)
border_focused      = "#ac3232" # col_cyan - focused window border
border_normal       = "#52263e" # col_gray2 - unfocused window border

[Keybindings]
# Define your modifier key (will replace "Mod" in bindings below)
Mod = "Super"

Mod+f = "toggle_fullscreen"

Mod+Shift+Return = "pkill -9 Xorg" # quit

# Window management
Mod+a       = "MOZ_USE_XINPUT2=1 firefox"
Mod+Shift+a = "pkill firefox"

Mod+s       = "flatpak run org.equicord.equibop"
Mod+Shift+s = "pkill equibop"

Mod+d       = "ghostty"
Mod+Shift+d = "pkill ghostty"

Mod+x = "~/Games/t-client/DDNet"

Mod+v       = "flatpak run com.github.th_ch.youtube_music"
Mod+Shift+v = "pkill youtube-music"

Mod+t       = "xeyes"   # Launch terminal
Mod+Shift+f = "close"
Mod+Shift+g = "kill"
Mod+Shift+t = "reload"  # Reload config

# Tiling layout controls
Mod+space       = "toggle_layout"         # Cycle: master_left → monocle → grid
Mod+Shift+space = "toggle_tiling"         # Enable/disable tiling
Mod+h           = "decrease_master"       # Make master area narrower
Mod+l           = "increase_master"       # Make master area wider
Mod+comma       = "increase_master_count" # More windows in master
Mod+period      = "decrease_master_count" # Fewer windows in master

# Workspace switching (1-4, q, w, e, r)
Mod+1 = "workspace_1"
Mod+2 = "workspace_2"
Mod+3 = "workspace_3"
Mod+4 = "workspace_4"
Mod+q = "workspace_5"
Mod+w = "workspace_6"
Mod+e = "workspace_7"
Mod+r = "workspace_8"

# Move focused window to workspace
Mod+Shift+1 = "move_to_workspace_1"
Mod+Shift+2 = "move_to_workspace_2"
Mod+Shift+3 = "move_to_workspace_3"
Mod+Shift+4 = "move_to_workspace_4"
Mod+Shift+q = "move_to_workspace_5"
Mod+Shift+w = "move_to_workspace_6"
Mod+Shift+e = "move_to_workspace_7"
Mod+Shift+r = "move_to_workspace_8"

# Application launchers
Mod+p = "rofi -show drun"

# Emergency/Debug
#Mod+Shift+d      = "dump_state"         # Print debug info
Mod+Shift+Escape = "emergency_recover"  # Emergency recovery mode

[bar]
show = true

# Bar height auto-adapts to font size by default.
# Uncomment to set a fixed height instead:
# height = 24

# Font configuration
font = "FiraCode Nerd Font Ret"
font_size = 10

# NEW: Spacing configuration for better readability!
padding = 10     # Padding inside segments (around text)
spacing = 16     # Space between segments

# Colors - matching your dwm config!
# col_gray1 = #0d0d14 (dark background)
# col_gray2 = #52263e (border/secondary)
# col_gray3 = #bbbbbb (normal foreground)
# col_gray4 = #eeeeee (selected foreground)
# col_cyan  = #ac3232 (focused color/accent)

bg          = "#0d0d14"  # col_gray1
fg          = "#bbbbbb"  # col_gray3
selected_bg = "#ac3232"  # col_cyan
selected_fg = "#eeeeee"  # col_gray4
occupied_fg = "#eeeeee"  # col_gray4
urgent_bg   = "#FF0000"
urgent_fg   = "#FFFFFF"

# NEW: Accent colors for bar segments!
# Default accent for all segments
accent_color = "#ac3232"  # col_cyan - matching your focused border

# NEW: Per-segment accent colors (optional - overrides accent_color)
[bar.colors]
workspaces = "#ac3232"  # col_cyan - red accent
title = "#52263e"       # col_gray2 - purple/burgundy
clock = "#ac3232"       # col_cyan - red accent

# NEW: Workspace icons - matches your Japanese theme!
# Using hiragana characters for your workspace labels
icons = ["あ", "か", "い", "は", "な", "つ", "ん", "で"]

# Alternative icon options (uncomment to try):
# Numbers with brackets (like your comments):
# icons = ["【1】", "【2】", "【3】", "【4】", "【5】", "【6】", "【7】", "【8】"]

# Full Japanese labels from your comments:
# icons = ["あ】Browser", "か】Socials", "い】Music", "は】Launchers", "な】Gaming", "つ】Code", "ん】Media", "で】Downloads"]

# Emoji matching your workspace purposes:
# icons = ["🌐", "💬", "🎵", "🚀", "🎮", "💻", "📺", "📥"]

# Nerd Font icons (if you want):
# icons = ["", "", "", "", "", "", "", ""]

indicator_size = 4
title_accent = true

# NEW: Configurable bar layout!
# You can rearrange segments however you like
# Available segments: "workspaces", "title", "clock", "layout"

# Default layout (workspaces left, title center, clock right):
[bar.layout.left]
segments = ["workspaces", "layout"]

[bar.layout.center]
segments = ["title"]

[bar.layout.right]
segments = ["clock"]

# Alternative layouts to try (uncomment to use):

# Minimal - just workspaces and clock:
# [bar.layout.left]
# segments = ["workspaces"]
# [bar.layout.right]
# segments = ["clock"]

# Everything on the left:
# [bar.layout.left]
# segments = ["workspaces", "title", "clock"]

# Clock on left (reversed!):
# [bar.layout.left]
# segments = ["clock", "title"]
# [bar.layout.right]
# segments = ["workspaces"]

[workspaces]
count = 8  # Number of virtual desktops (1-20)

