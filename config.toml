### akai_hana's personal hana WM config.toml :-) ###

### NOTES:
### (configuration tips & tricks)
#
# + All parameters (X =) and values (= Y) are CAPS-insensitive. 
#   - _It boils down to preference. Style them however you want :9_
#
# + Numerical values can be either N (px) or N%/%N (ratio)
#   - The former represents an exact amount of pixels,
#     while the latter represents a ratio between two elements.
#     For example, 'gaps = 5%' will make gaps take up 5%
#     of viewable area in relation to the size of windows.
#   - Any percentage value can be N% or %N, decimal or not (N.NN%),
#     and if decimal, use a dot or a comma (N.N%/N,N%).
#
# + Any string can be wrapped with "" or ''
#
# + HEX code values can be set with either of the following formats:
#   (RRGGBB/rrggbb, ""/'') "#RRGGBB" / RRGGBB / 0xRRGGBB
#

[tiling]
enabled = true

# Enabled layouts
## First is default; cycling follows order
## Layouts are now respected in the exact order specified
## Commented out layouts will not appear in the cycle
layouts = [
    "master-stack",
    "monocle",
    "grid",
    # "fibonacci", # <- not yet implemented
]

[tiling.aesthetics]
# Percentage values now use a new scaling system:
# - 0-100%: Linear scaling where 100% = 50% of window space (half window, half gaps/border)
# - 100-200%: Can go extreme, where 200% = entire window consumed by gaps/border
# This keeps the 0-100% range "sane" while allowing extreme customization if needed
gaps             = 2.5%
border_width     = 1%
border_focused   = '#ac3232'
border_unfocused = '#52263e' # Letters can also be MAJUS/minus

[tiling.layouts.master-stack]
count = 1        # Number of windows in master area (master stack size)
side  = "left"   # "left"/"right" / 'L'/'R'
width = 50%      # N/N% (5%-95% suggested range)

[bar]
enabled = true
position = "bottom" # top/bottom; can be swapped on runtime

# Font array
# Priority order: first font is primary, others come next when first doesn't support some character.
# Useful for non-ASCII character support, while retaining a primary ASCII font.
fonts = [
    "FiraCode Nerd Font Propo Ret",
    "Noto Sans CJK JP", # to render japanese characters
]

# Font size as percentage of bar height (e.g., 16% = font takes up 16% of the bar's vertical space)
font_size = 16%

# Spacing between each segment/module inside the bar
segment_spacing = 8%

# Workspace labels/icons (1-N)
icons = ["あ", "か", "い", "は", "な", "つ", "ん", "で"]

# Workspace width as percentage of base (100% = 40px, 150% = 60px, or set exact pixels)
workspace_width = 125%  # Default base width

# Bar height
## Auto-adapts to font size by default. Uncomment to set a fixed height instead:
## TODO: Future enhancement: percentage values where 100% = auto-calculated size, 150% = 1.5x auto size.
height = 60

# Padding inside segments (horizontal space around text content within each segment)
padding = 99

# Bar transparency (0 = fully transparent, 1 = fully opaque)
# With picom's gaussian blur, the bar will show blurred content behind it
transparency = 0% # [0.0 - 1.0] / [0% - 100%]

# Main color palette
## Bar
bg = "#0d0d14"
fg = "#ebd9bc"

## Workspace tag indicators
selected_bg = "#ac3232"
selected_fg = "#eeeeee"
occupied_fg = "#eeeeee"
urgent_bg   = "#FF0000"
urgent_fg   = "#FFFFFF"

# Indicator size as percentage (100% = 4px base, 150% = 6px, or set exact pixels)
indicator_size = 100%

# Accent colors for bar segments
# Default accent for all segments
# accent_color = "#ac3232"
accent_color = "#ac3232"

# "#007373"
# 009691
# 85a796

# Per-segment accent colors (overrides default accent_color)
# These are now properly working - each segment can have its own accent color
[bar.colors]
workspaces = "#b9c0a8"  # Custom accent for workspace indicators
title = "#ac3232"       # Custom accent for title segment  
clock = "#ac3232"       # Custom accent for clock segment

# Configurable bar layout
# You can rearrange segments however you like
# Available segments: "workspaces", "title", "clock", "layout"

# Bar layout
# Anchors: left/center/right
[bar.layout.left]
segments = ["workspaces", "layout"]

[bar.layout.center]
segments = ["title"]

[bar.layout.right]
segments = ["clock"]

# Bar module configurations
[bar.modules.workspaces]
count = 8  # Number of workspaces

[binds]
# Convenience alias
## Parameter placeholders
Mod = "Super" # Super/Mod4, Alt/Mod1

## Value placeholders ({})
kill = "pkill -9" # program kill value placeholder

# WM interactions
Mod+F = "toggle_fullscreen"
Mod+Shift+Return = "{kill} Xorg" # quit wm
Mod+Shift+F = "close_window" # Close focused window
Mod+Shift+T = "reload" # Config hot-reload

# wallpaper
Mod+G = "~/eudaimonia/shader-wallpaper/shadow/scripts/shader-switch.sh" # start shader wallpaper
Mod+Shift+G = "~/eudaimonia/shader-wallpaper/shadow/scripts/shader-stop.sh" # stop shader wallpaper

# Tiling
Mod+N           = "toggle_tiling" # Enable/disable tiling
Mod+space       = "toggle_layout" # Cycle layouts forward
Mod+Shift+space = "toggle_layout_reverse" # Cycle layouts backward
Mod+Tab         = "swap_master"   # Swap focused window with master (slave→master or master↔slave)

# Layouts
## Master-stack
Mod+H      = "decrease_master" 
Mod+L      = "increase_master" # Increase master area width
Mod+comma  = "increase_master_count"
Mod+period = "decrease_master_count" 

# Workspaces
# Switch to workspace N
Mod+1 = "workspace_1"
Mod+2 = "workspace_2"
Mod+3 = "workspace_3"
Mod+4 = "workspace_4"
Mod+Q = "workspace_5"
Mod+W = "workspace_6"
Mod+E = "workspace_7"
Mod+R = "workspace_8"

# Move window to workspace N
Mod+Shift+1 = "move_to_workspace_1"
Mod+Shift+2 = "move_to_workspace_2"
Mod+Shift+3 = "move_to_workspace_3"
Mod+Shift+4 = "move_to_workspace_4"
Mod+Shift+Q = "move_to_workspace_5"
Mod+Shift+W = "move_to_workspace_6"
Mod+Shift+E = "move_to_workspace_7"
Mod+Shift+R = "move_to_workspace_8"

# Note: The config parser now automatically generates move_to_workspace_N binds
# from workspace_N binds when using Mod+Shift modifier. You can still override
# specific binds if needed by defining them explicitly.

# Bar
Mod+B = "toggle_bar_visibility"     # shown/hidden
Mod+Shift+B = "toggle_bar_position" # top/bottom

# Application launchers
Mod+P = "rofi -show drun"

# Program binds

## Misc
Mod+A       = "MOZ_USE_XINPUT2=1 firefox"
Mod+Shift+A = "{kill} firefox"

Mod+s       = "flatpak run org.equicord.equibop"
Mod+Shift+S = "{kill} equibop"

Mod+d       = "ghostty"
Mod+Shift+D = "{kill} ghostty"

# z -> osu

Mod+X       = "~/Games/t-client/DDNet"
Mod+Shift+X = "{kill} DDNet"

Mod+c       = "flatpak run com.valvesoftware.Steam"
Mod+Shift+C = "{kill} steam"

Mod+V       = "flatpak run com.github.th_ch.youtube_music"
Mod+Shift+V = "{kill} youtube-music"

# Emergency/Debug
# Emergency recovery: Disables tiling, clears fullscreen, maps all windows, stops drag
Mod+Shift+Escape = "emergency_recover"

# Workspace rules
[workspace.rules.1] # browser
Navigator
Firefox

[workspace.rules.2] # socials
discord
vesktop
equibop
electron

[workspace.rules.3] # music
com.github.th_ch.youtube_music

[workspace.rules.4] # launchers
OpenTabletDriver.UX

[workspace.rules.5] # gaming
"osu!"
DDNet

[workspace.rules.6] # editors
emacs
xeyes

[workspace.rules.7] # Media
freetube
gimp

[workspace.rules.8] # torrenting
deluge

